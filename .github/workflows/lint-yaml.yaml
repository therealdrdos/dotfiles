---
name: YAML Lint

on:
  push:
    branches:
      - main
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.yamllint'
      - '.github/workflows/lint-yaml.yaml'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '.yamllint'
      - '.github/workflows/lint-yaml.yaml'

jobs:
  yaml-lint:
    name: Lint YAML files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint
          file_or_dir: |
            lsd/
            .github/workflows/
          strict: true
